<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Areas</title>
</head>
<body>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: grid;
            place-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .grid-container {
            display: grid;
            gap: 10px; 
            padding: 10px;
            border: 2px solid #333;
            width: 80vw; 
            height: 60vh; 
            
            grid-template-columns: 1fr 200px;
            grid-template-rows: 150px 1fr 100px;
            
            grid-template-areas: 
                "header header"
                "content sidebar"
                "footer footer";
        }

        #min-header {
            grid-area: header; 
            background-color: orange;
        }

        #mitt-content {
            grid-area: content;
            background-color: lightgreen;
        }

        #min-sidebar {
            grid-area: sidebar;
            background-color: pink;
        }

        #min-footer {
            grid-area: footer;
            background-color: skyblue;
        }

        .grid-container > div {
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
    
    <div class="grid-container">
        <div id="min-header">HEADER</div>
        <div id="mitt-content">CONTENT</div>
        <div id="min-sidebar">SIDEBAR</div>
        <div id="min-footer">FOOTER</div>
    </div>
</body>
</html>
