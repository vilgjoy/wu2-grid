<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: grid;
            place-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .grid-container {
            display: grid;
            /* width: 50vw; */
            gap: 10px; 
            padding: 10px;
            border: 2px solid #333;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(3, 100px);
            
        }

        .grid-container > div {
            background-color: skyblue;
            border: 1px solid #0077cc;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <div class="grid-container">
        <div>1</div>
	    <div>2</div>
	    <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
        <div>11</div>
        <div>12</div>
        <div>13</div>
    </div>
</body>
</html>
