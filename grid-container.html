<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: grid;
            place-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .grid-container {
            display: grid;
            /* width: 50vw; */
            gap: 2rem; 
            padding: 10px;
            border: 2px solid #333;
            grid-template-columns: 30px repeat(3, [kol-start] 1fr [kol-slut]) 30px;
            grid-template-rows: repeat(2, [rad-start] 100px [rad-slut]);            
        }

        #item-1 {
            background-color: orange; 
            grid-row: rad-start 1 / rad-slut 2;
            grid-column: kol-start 1 / kol-slut 3;
        }

        .grid-container > div {
            background-color: skyblue;
            border: 1px solid #0077cc;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <div class="grid-container">
        <div id="item-1">1</div>
	    <div>2</div>
	    <div>3</div>
        <div>4</div>
    </div>
</body>
</html>
